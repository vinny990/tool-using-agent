<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Research Assistant</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0f1117;
      color: #e2e8f0;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    header {
      padding: 1rem 1.5rem;
      border-bottom: 1px solid #1e2535;
      display: flex;
      align-items: center;
      gap: 0.6rem;
    }
    header h1 { font-size: 1.1rem; font-weight: 600; }
    header .badge {
      font-size: 0.7rem;
      background: #1a2740;
      color: #60a5fa;
      border: 1px solid #2d4a7a;
      border-radius: 4px;
      padding: 2px 7px;
    }

    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
    }

    .bubble-wrap { display: flex; flex-direction: column; gap: 0.35rem; }

    .bubble-wrap.user { align-items: flex-end; }
    .bubble-wrap.assistant { align-items: flex-start; }

    .bubble {
      max-width: 72%;
      padding: 0.75rem 1rem;
      border-radius: 12px;
      line-height: 1.6;
      font-size: 0.92rem;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .bubble.user {
      background: #2563eb;
      color: #fff;
      border-bottom-right-radius: 3px;
    }

    .bubble.answer {
      background: #1e2535;
      border-bottom-left-radius: 3px;
    }

    /* Reasoning steps */
    .steps {
      max-width: 72%;
      font-size: 0.8rem;
      color: #94a3b8;
    }

    .steps-header {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      margin-bottom: 0.4rem;
      cursor: pointer;
      user-select: none;
    }
    .steps-header:hover { color: #cbd5e1; }
    .steps-header .arrow { transition: transform 0.2s; }
    .steps-header.open .arrow { transform: rotate(90deg); }

    .steps-list { display: none; flex-direction: column; gap: 0.5rem; }
    .steps-list.visible { display: flex; }

    .step {
      background: #141824;
      border: 1px solid #1e2535;
      border-radius: 8px;
      padding: 0.6rem 0.8rem;
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 0.3rem 0.6rem;
    }

    .step-tool {
      grid-column: 1 / -1;
      display: flex;
      align-items: center;
      gap: 0.4rem;
      font-weight: 600;
      color: #e2e8f0;
      margin-bottom: 0.2rem;
    }
    .tool-icon {
      font-size: 0.85rem;
      background: #1a2740;
      border: 1px solid #2d4a7a;
      border-radius: 4px;
      padding: 1px 5px;
      color: #60a5fa;
    }
    .tool-icon.calc { background: #1a2a1e; border-color: #2d5a35; color: #4ade80; }

    .step-label { color: #64748b; font-size: 0.75rem; padding-top: 1px; }
    .step-value { color: #94a3b8; font-size: 0.78rem; word-break: break-word; }

    /* Thinking indicator */
    .thinking {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.85rem;
      color: #64748b;
      padding: 0.5rem 0;
    }
    .dots span {
      display: inline-block;
      width: 5px; height: 5px;
      background: #64748b;
      border-radius: 50%;
      animation: bounce 1.2s infinite;
    }
    .dots span:nth-child(2) { animation-delay: 0.2s; }
    .dots span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce {
      0%, 80%, 100% { transform: translateY(0); opacity: 0.5; }
      40% { transform: translateY(-5px); opacity: 1; }
    }

    /* Input bar */
    #input-bar {
      padding: 1rem 1.5rem;
      border-top: 1px solid #1e2535;
      display: flex;
      gap: 0.75rem;
    }

    #question {
      flex: 1;
      background: #1e2535;
      border: 1px solid #2d3748;
      border-radius: 8px;
      color: #e2e8f0;
      padding: 0.65rem 1rem;
      font-size: 0.92rem;
      outline: none;
      resize: none;
      line-height: 1.5;
      max-height: 120px;
      overflow-y: auto;
    }
    #question::placeholder { color: #475569; }
    #question:focus { border-color: #2563eb; }

    #send-btn {
      background: #2563eb;
      border: none;
      border-radius: 8px;
      color: #fff;
      padding: 0 1.1rem;
      font-size: 1rem;
      cursor: pointer;
      align-self: flex-end;
      height: 40px;
      min-width: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s;
    }
    #send-btn:hover { background: #1d4ed8; }
    #send-btn:disabled { background: #1e2535; color: #475569; cursor: not-allowed; }

    .error-bubble {
      background: #2d1515;
      border: 1px solid #5a2020;
      color: #f87171;
      padding: 0.75rem 1rem;
      border-radius: 10px;
      font-size: 0.88rem;
      max-width: 72%;
    }
  </style>
</head>
<body>

<header>
  <h1>Research Assistant</h1>
  <span class="badge">ReAct Agent</span>
</header>

<div id="chat"></div>

<div id="input-bar">
  <textarea id="question" rows="1" placeholder="Ask anything — the agent will search the web or calculate as needed…"></textarea>
  <button id="send-btn" title="Send">&#8593;</button>
</div>

<script>
  const chat = document.getElementById("chat");
  const input = document.getElementById("question");
  const btn = document.getElementById("send-btn");

  // Auto-grow textarea
  input.addEventListener("input", () => {
    input.style.height = "auto";
    input.style.height = Math.min(input.scrollHeight, 120) + "px";
  });

  input.addEventListener("keydown", e => {
    if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); send(); }
  });
  btn.addEventListener("click", send);

  function toolIcon(name) {
    const n = (name || "").toLowerCase();
    if (n.includes("calc")) return `<span class="tool-icon calc">∑ calculator</span>`;
    return `<span class="tool-icon">🔍 web search</span>`;
  }

  function renderSteps(steps) {
    if (!steps || steps.length === 0) return null;

    const wrap = document.createElement("div");
    wrap.className = "steps";

    const header = document.createElement("div");
    header.className = "steps-header";
    header.innerHTML = `<span class="arrow">▶</span> Reasoning steps (${steps.length})`;

    const list = document.createElement("div");
    list.className = "steps-list";

    steps.forEach((s, i) => {
      const step = document.createElement("div");
      step.className = "step";
      step.innerHTML = `
        <div class="step-tool">${toolIcon(s.tool)}<span>${s.tool}</span></div>
        <span class="step-label">Input</span>
        <span class="step-value">${escHtml(String(s.input))}</span>
        <span class="step-label">Output</span>
        <span class="step-value">${escHtml(String(s.output).slice(0, 400))}${String(s.output).length > 400 ? "…" : ""}</span>
      `;
      list.appendChild(step);
    });

    header.addEventListener("click", () => {
      const open = list.classList.toggle("visible");
      header.classList.toggle("open", open);
    });

    wrap.appendChild(header);
    wrap.appendChild(list);
    return wrap;
  }

  function escHtml(str) {
    return str.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
  }

  function addUserBubble(text) {
    const wrap = document.createElement("div");
    wrap.className = "bubble-wrap user";
    const b = document.createElement("div");
    b.className = "bubble user";
    b.textContent = text;
    wrap.appendChild(b);
    chat.appendChild(wrap);
    return wrap;
  }

  function addThinking() {
    const wrap = document.createElement("div");
    wrap.className = "bubble-wrap assistant";
    wrap.innerHTML = `<div class="thinking"><div class="dots"><span></span><span></span><span></span></div>Thinking…</div>`;
    chat.appendChild(wrap);
    return wrap;
  }

  function addAssistantBubble(answer, steps) {
    const wrap = document.createElement("div");
    wrap.className = "bubble-wrap assistant";

    const stepsEl = renderSteps(steps);
    if (stepsEl) wrap.appendChild(stepsEl);

    const b = document.createElement("div");
    b.className = "bubble answer";
    b.textContent = answer;
    wrap.appendChild(b);

    chat.appendChild(wrap);
  }

  function addError(msg) {
    const wrap = document.createElement("div");
    wrap.className = "bubble-wrap assistant";
    const b = document.createElement("div");
    b.className = "error-bubble";
    b.textContent = "Error: " + msg;
    wrap.appendChild(b);
    chat.appendChild(wrap);
  }

  async function send() {
    const question = input.value.trim();
    if (!question) return;

    input.value = "";
    input.style.height = "auto";
    btn.disabled = true;

    addUserBubble(question);
    const thinking = addThinking();
    chat.scrollTop = chat.scrollHeight;

    try {
      const res = await fetch("/ask", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ question }),
      });
      const data = await res.json();

      thinking.remove();

      if (data.error) {
        addError(data.error);
      } else {
        addAssistantBubble(data.answer, data.steps);
      }
    } catch (err) {
      thinking.remove();
      addError("Network error — is the server running?");
    }

    btn.disabled = false;
    chat.scrollTop = chat.scrollHeight;
    input.focus();
  }
</script>

</body>
</html>
